---
- name: Base node configuration
  hosts: k8s
  gather_facts: false
  become: true

  tasks:
    - name: Set timezone
      community.general.timezone:
        name: America/New_York

- name: Initialize first k3s server node (embedded etcd)
  hosts: k3s_init
  gather_facts: true
  become: true

  vars:
    k3s_version: "stable"

  tasks:

    - name: Create kube-vip RBAC manifest
      copy:
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml
        content: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: kube-vip
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: system:kube-vip-role
          rules:
          - apiGroups: [""]
            resources: [nodes, pods, endpoints, services, services/status, configmaps]
            verbs: [list, get, watch, update]
          - apiGroups: [coordination.k8s.io]
            resources: [leases]
            verbs: [list, get, watch, create, update, delete]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: system:kube-vip-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: system:kube-vip-role
          subjects:
          - kind: ServiceAccount
            name: kube-vip
            namespace: kube-system

    - name: Create kube-vip DaemonSet manifest
      copy:
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
        content: |
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: kube-vip-ds
            namespace: kube-system
            labels:
              app.kubernetes.io/name: kube-vip-ds
          spec:
            selector:
              matchLabels:
                app.kubernetes.io/name: kube-vip-ds
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: kube-vip-ds
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                      - matchExpressions:
                        - key: node-role.kubernetes.io/control-plane
                          operator: Exists
                containers:
                - name: kube-vip
                  image: ghcr.io/kube-vip/kube-vip:v1.1.2
                  args: [manager]
                  env:
                  - name: vip_arp
                    value: "true"
                  - name: port
                    value: "6443"
                  - name: vip_interface
                    value: "{{ ansible_default_ipv4.interface }}"
                  - name: cp_enable
                    value: "true"
                  - name: svc_enable
                    value: "false"
                  - name: vip_leaderelection
                    value: "true"
                  - name: vip_leaseduration
                    value: "5"
                  - name: vip_renewdeadline
                    value: "3"
                  - name: vip_retryperiod
                    value: "1"
                  - name: address
                    value: "192.168.0.60"
                  securityContext:
                    capabilities:
                      add: [NET_ADMIN, NET_RAW]
                hostNetwork: true
                serviceAccountName: kube-vip
                tolerations:
                - effect: NoSchedule
                  operator: Exists
                - effect: NoExecute
                  operator: Exists
      notify: Apply kube-vip DaemonSet manifest

    - name: Write k3s config with VIP TLS SANs
      copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          tls-san:
            - ubuntu1.home
            - 192.168.0.60
            - k8s.home.grogscave.net
          disable:
            - servicelb
          node-ip: "{{ node_ip }}"
      notify: Restart k3s

    - name: Install k3s on init node
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_TOKEN="{{ k3s_token }}" \
          INSTALL_K3S_CHANNEL="{{ k3s_version }}" \
          sh -s - server \
            --cluster-init
      args:
        creates: /usr/local/bin/k3s

    - name: Wait until node is Ready
      command: k3s kubectl get node "{{ ansible_hostname }}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 30
      delay: 10
      until: node_ready.stdout == "True"

    - name: Fetch kubeconfig and point at VIP
      shell: |
        sed 's|https://127.0.0.1:6443|https://k8s.home.grogscave.net:6443|g' \
          /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_patched

    - name: Write patched kubeconfig locally
      become: false
      local_action:
        module: copy
        content: "{{ kubeconfig_patched.stdout }}"
        dest: "{{ lookup('env', 'HOME') }}/.kube/k3s-homelab.yaml"
        mode: "0600"

  handlers:
    - name: Cordon node for restart
      listen: Restart k3s
      command: k3s kubectl cordon {{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Drain node for restart
      listen: Restart k3s
      command: >
        k3s kubectl drain {{ ansible_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --disable-eviction
        --grace-period=120
        --timeout=300s
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Restart k3s service
      listen: Restart k3s
      systemd:
        name: k3s
        state: restarted

    - name: Wait for node Ready after restart
      listen: Restart k3s
      command: k3s kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: _ready
      retries: 30
      delay: 10
      until: _ready.stdout == "True"
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Uncordon node after restart
      listen: Restart k3s
      command: k3s kubectl uncordon {{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Recycle Longhorn CSI plugin pod after restart
      listen: Restart k3s
      command: >
        k3s kubectl delete pod -n longhorn-system
        -l app=longhorn-csi-plugin
        --field-selector spec.nodeName={{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Apply kube-vip DaemonSet manifest
      command: k3s kubectl apply -f /var/lib/rancher/k3s/server/manifests/kube-vip.yaml

- name: Join remaining server nodes to k3s cluster
  hosts: k3s_join
  serial: 1
  gather_facts: true
  become: true

  vars:
    k3s_version: "stable"

  tasks:

    - name: Write k3s config to disable servicelb
      copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          disable:
            - servicelb
          node-ip: "{{ node_ip }}"
      notify: Restart k3s

    - name: Join node to k3s cluster
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_TOKEN="{{ k3s_token }}" \
          INSTALL_K3S_CHANNEL="{{ k3s_version }}" \
          sh -s - server \
            --server https://ubuntu1.home:6443
      args:
        creates: /usr/local/bin/k3s

    - name: Wait until node is Ready
      delegate_to: "{{ groups['k3s_init'][0] }}"
      command: k3s kubectl get node "{{ ansible_hostname }}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 30
      delay: 10
      until: node_ready.stdout == "True"

  handlers:
    - name: Cordon node for restart
      listen: Restart k3s
      command: k3s kubectl cordon {{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Drain node for restart
      listen: Restart k3s
      command: >
        k3s kubectl drain {{ ansible_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --disable-eviction
        --grace-period=120
        --timeout=300s
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Restart k3s service
      listen: Restart k3s
      systemd:
        name: k3s
        state: restarted

    - name: Wait for node Ready after restart
      listen: Restart k3s
      command: k3s kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: _ready
      retries: 30
      delay: 10
      until: _ready.stdout == "True"
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Uncordon node after restart
      listen: Restart k3s
      command: k3s kubectl uncordon {{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

    - name: Recycle Longhorn CSI plugin pod after restart
      listen: Restart k3s
      command: >
        k3s kubectl delete pod -n longhorn-system
        -l app=longhorn-csi-plugin
        --field-selector spec.nodeName={{ ansible_hostname }}
      delegate_to: "{{ groups['k3s_init'][0] }}"

- name: Verify cluster
  hosts: k3s_init
  gather_facts: false
  become: true

  tasks:

    - name: Show all cluster nodes
      command: k3s kubectl get nodes -o wide
      register: nodes_output

    - name: Print nodes
      debug:
        msg: "{{ nodes_output.stdout_lines }}"
