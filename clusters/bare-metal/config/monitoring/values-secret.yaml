#@ load("@ytt:data", "data")
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-values
  namespace: bootstrap
type: Opaque
stringData:
  #@yaml/text-templated-strings
  values.yaml: |
    grafana:
      adminPassword: "(@= data.values.grafana.adminPassword @)"
    alertmanager:
      config:
        global:
          smtp_smarthost: "smtp.mail.me.com:587"
          smtp_from: "Homelab Alerts <(@= data.values.alertmanager.smtp.username @)>"
          smtp_auth_username: "(@= data.values.alertmanager.smtp.username @)"
          smtp_auth_password: "(@= data.values.alertmanager.smtp.password @)"
          smtp_require_tls: true
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "email"
          routes:
          - matchers:
            - alertname = "Watchdog"
            receiver: "null"
        receivers:
        - name: "null"
        - name: "email"
          email_configs:
          - to: "(@= data.values.alertmanager.emailTo @)"
            send_resolved: true
        inhibit_rules:
        - source_matchers:
          - severity = "critical"
          target_matchers:
          - severity = "warning"
          equal: ["alertname", "namespace"]
