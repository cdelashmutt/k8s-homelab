---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-dashboard
  namespace: monitoring
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting monitoring"
  labels:
    grafana_dashboard: "1"
data:
  cert-manager.json: |
    {
      "title": "cert-manager",
      "uid": "cert-manager-homelab",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Certificates",
          "type": "row",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "title": "Certs Ready",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(certmanager_certificate_ready_status{condition=\"True\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 3,
          "title": "Certs Not Ready",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(certmanager_certificate_ready_status{condition=\"False\"}) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 4,
          "title": "Min Days to Expiry",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 14 },
                  { "color": "green", "value": 30 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "min((certmanager_certificate_expiration_timestamp_seconds - time()) / 86400)",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 5,
          "title": "ACME Requests (1h)",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(increase(certmanager_http_acme_client_request_count[1h])) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 6,
          "title": "Days Until Expiry by Certificate",
          "type": "bargauge",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "d",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 14 },
                  { "color": "green", "value": 30 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400",
              "instant": true,
              "legendFormat": "{{namespace}}/{{name}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 }
        },
        {
          "id": 7,
          "title": "Certificate Status",
          "type": "table",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Ready", "color": "green" },
                    "0": { "text": "Not Ready", "color": "red" }
                  }
                }
              ]
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Value", "desc": false }]
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "certmanager_certificate_ready_status{condition=\"True\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A",
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "condition": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "service": true
                },
                "renameByName": {
                  "name": "Certificate",
                  "namespace": "Namespace",
                  "issuer_name": "Issuer",
                  "issuer_kind": "Issuer Kind",
                  "Value": "Ready"
                }
              }
            }
          ],
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 }
        },
        {
          "id": 8,
          "title": "Reconciler",
          "type": "row",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 9,
          "title": "Reconcile Rate",
          "type": "timeseries",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (controller) (rate(controller_runtime_reconcile_total{namespace=\"cert-manager\"}[5m]))",
              "legendFormat": "{{controller}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 }
        },
        {
          "id": 10,
          "title": "Reconcile Errors",
          "type": "timeseries",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (controller) (rate(controller_runtime_reconcile_errors_total{namespace=\"cert-manager\"}[5m]))",
              "legendFormat": "{{controller}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 }
        }
      ],
      "tags": ["homelab", "cert-manager"],
      "editable": true,
      "graphTooltip": 0,
      "links": [
        {
          "title": "Homelab Overview",
          "url": "/d/homelab-overview/homelab-overview",
          "type": "link",
          "targetBlank": false
        }
      ],
      "annotations": { "list": [] },
      "templating": { "list": [] }
    }
