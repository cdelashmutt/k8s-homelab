---
apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-dashboard
  namespace: monitoring
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting monitoring"
  labels:
    grafana_dashboard: "1"
data:
  harbor.json: |
    {
      "title": "Harbor",
      "uid": "harbor-homelab",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Health",
          "type": "row",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "title": "Components Up",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 3 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "count(up{namespace=\"harbor\"} == 1) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 3,
          "title": "Registry Storage Used",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"harbor\",persistentvolumeclaim=\"harbor-registry\"} / kubelet_volume_stats_capacity_bytes{namespace=\"harbor\",persistentvolumeclaim=\"harbor-registry\"} * 100",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 4,
          "title": "Registry Storage Used (bytes)",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"harbor\",persistentvolumeclaim=\"harbor-registry\"}",
              "instant": true,
              "refId": "A"
            }
          ],
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 4 }
        },
        {
          "id": 5,
          "title": "Component Status",
          "type": "stat",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": { "text": "Up", "color": "green" },
                    "0": { "text": "Down", "color": "red" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "up{namespace=\"harbor\"}",
              "instant": true,
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 4 }
        },
        {
          "id": 6,
          "title": "Storage",
          "type": "row",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 7,
          "title": "Registry Storage Over Time",
          "type": "timeseries",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"harbor\"}",
              "legendFormat": "{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 8 }
        },
        {
          "id": 8,
          "title": "Activity",
          "type": "row",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 9,
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (method, code) (rate(harbor_core_http_total[5m]))",
              "legendFormat": "{{method}} {{code}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 15, "w": 12, "h": 8 }
        },
        {
          "id": 10,
          "title": "HTTP Request Duration (p99)",
          "type": "timeseries",
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.99, sum by (le, method) (rate(harbor_core_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99 {{method}}",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 15, "w": 12, "h": 8 }
        }
      ],
      "tags": ["homelab", "harbor"],
      "editable": true,
      "graphTooltip": 0,
      "links": [
        {
          "title": "Homelab Overview",
          "url": "/d/homelab-overview/homelab-overview",
          "type": "link",
          "targetBlank": false
        }
      ],
      "annotations": { "list": [] },
      "templating": { "list": [] }
    }
