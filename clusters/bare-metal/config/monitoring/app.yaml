---
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-values
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: monitoring-values
data:
  values.yaml: |
    grafana:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
        - grafana.home.grogscave.net
        tls:
        - secretName: wildcard-tls
          hosts:
          - grafana.home.grogscave.net
      grafana.ini:
        dashboards:
          default_home_dashboard_path: /tmp/dashboards/homelab-overview.json
      sidecar:
        datasources:
          enabled: true
    kube-state-metrics:
      rbac:
        extraRules:
          - apiGroups:
              - longhorn.io
            resources:
              - engineimages
            verbs:
              - list
              - watch
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: longhorn.io
                  version: v1beta2
                  kind: EngineImage
                metricNamePrefix: longhorn_engine_image
                metrics:
                  - name: ref_count
                    help: "Number of volumes using this engine image"
                    each:
                      type: Gauge
                      gauge:
                        path: [status, refCount]
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    prometheus:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
        - prometheus.home.grogscave.net
        tls:
        - secretName: wildcard-tls
          hosts:
          - prometheus.home.grogscave.net
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
    alertmanager:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
        - alertmanager.home.grogscave.net
        tls:
        - secretName: wildcard-tls
          hosts:
          - alertmanager.home.grogscave.net
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: monitoring
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: monitoring
    kapp.k14s.io/change-rule.0: "upsert after upserting monitoring-values"
    kapp.k14s.io/change-rule.1: "upsert after upserting longhorn"
    kapp.k14s.io/change-rule.2: "upsert after upserting cert-manager"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - helmChart:
      name: kube-prometheus-stack
      version: "83.5.0"
      repository:
        url: https://prometheus-community.github.io/helm-charts
  template:
  - helmTemplate:
      namespace: monitoring
      valuesFrom:
      - secretRef:
          name: alertmanager-values
      - configMapRef:
          name: monitoring-values
  - ytt:
      inline:
        paths:
          namespace.yaml: |
            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: monitoring
          kapp-controller-servicemonitor.yaml: |
            ---
            apiVersion: monitoring.coreos.com/v1
            kind: ServiceMonitor
            metadata:
              name: kapp-controller
              namespace: monitoring
              labels:
                release: monitoring
            spec:
              namespaceSelector:
                matchNames:
                - kapp-controller
              selector: {}
              endpoints:
              - port: metrics
                interval: 30s
          remove-helm-tests.yaml: |
            #@ load("@ytt:overlay", "overlay")
            #@overlay/match by=overlay.subset({"metadata": {"annotations": {"helm.sh/hook": "test"}}}), expects="0+"
            #@overlay/remove
          disable-label-scoping.yaml: |
            #@ load("@ytt:overlay", "overlay")
            #@overlay/match by=overlay.subset({"kind": "Service", "metadata": {"name": "monitoring-kube-prometheus-prometheus"}})
            ---
            metadata:
              #@overlay/match missing_ok=True
              annotations:
                #@overlay/match missing_ok=True
                kapp.k14s.io/disable-label-scoping: ""
            #@overlay/match by=overlay.subset({"kind": "Service", "metadata": {"name": "monitoring-kube-prometheus-alertmanager"}})
            ---
            metadata:
              #@overlay/match missing_ok=True
              annotations:
                #@overlay/match missing_ok=True
                kapp.k14s.io/disable-label-scoping: ""
  deploy:
  - kapp: {}
