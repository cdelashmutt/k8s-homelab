---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cert-manager-alerts
  namespace: monitoring
  annotations:
    kapp.k14s.io/change-rule: "upsert after upserting monitoring"
  labels:
    release: monitoring
spec:
  groups:
  - name: cert-manager
    rules:
    - alert: CertificateExpiringSoon
      expr: (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in {{ $value | printf \"%.0f\" }} days"
        description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} issued by {{ $labels.issuer_name }} will expire in less than 14 days."
    - alert: CertificateExpiryCritical
      expr: (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 7
      for: 1h
      labels:
        severity: critical
      annotations:
        summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in {{ $value | printf \"%.0f\" }} days"
        description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} issued by {{ $labels.issuer_name }} will expire in less than 7 days."
    - alert: CertificateNotReady
      expr: certmanager_certificate_ready_status{condition="False"} == 1
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} is not ready"
        description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} has been in a not-ready state for more than 10 minutes."
