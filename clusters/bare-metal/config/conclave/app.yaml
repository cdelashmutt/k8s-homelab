#@ load("@ytt:data", "data")
#@ load("@ytt:json", "json")
---
apiVersion: v1
kind: Namespace
metadata:
  name: conclave
  annotations:
    kapp.k14s.io/change-group: conclave-namespace
---
apiVersion: v1
kind: Secret
metadata:
  name: conclave-db-secret
  namespace: conclave
  annotations:
    kapp.k14s.io/change-group: conclave-db-secret
    kapp.k14s.io/change-rule: "upsert after upserting conclave-namespace"
type: Opaque
stringData:
  POSTGRES_PASSWORD: #@ data.values.conclave.dbPassword
---
apiVersion: v1
kind: Secret
metadata:
  name: conclave-backend-secret
  namespace: conclave
  annotations:
    kapp.k14s.io/change-group: conclave-backend-secret
    kapp.k14s.io/change-rule: "upsert after upserting conclave-namespace"
type: Opaque
stringData:
  DB_PASSWORD: #@ data.values.conclave.dbPassword
  JWT_SECRET: #@ data.values.conclave.jwtSecret
  SMTP_USER: #@ data.values.conclave.smtpUser
  SMTP_PASSWORD: #@ data.values.conclave.smtpPassword
  MAIL_FROM: #@ data.values.conclave.mailFrom
  MAIL_HOST: #@ data.values.conclave.mailHost
  MAIL_PORT: #@ data.values.conclave.mailPort
  ALLOWED_EMAILS: #@ data.values.conclave.allowedEmails
  BGG_TOKEN: #@ data.values.conclave.bggToken
---
# Classic PAT required — fine-grained tokens do not support package registry access
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: conclave
  annotations:
    kapp.k14s.io/change-group: conclave-ghcr-pull-secret
    kapp.k14s.io/change-rule: "upsert after upserting conclave-namespace"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: #@ json.encode({"auths": {"ghcr.io": {"username": "cdelashmutt", "password": data.values.conclave.ghcrPat}}})
---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: conclave
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: conclave
    kapp.k14s.io/change-rule.0: "upsert after upserting conclave-git-auth"
    kapp.k14s.io/change-rule.1: "upsert after upserting conclave-namespace"
    kapp.k14s.io/change-rule.2: "upsert after upserting conclave-db-secret"
    kapp.k14s.io/change-rule.3: "upsert after upserting conclave-backend-secret"
    kapp.k14s.io/change-rule.4: "upsert after upserting conclave-ghcr-pull-secret"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 5m
  fetch:
  - git:
      url: https://github.com/cdelashmutt/conclave
      ref: origin/main
      secretRef:
        name: conclave-git-auth
      subPath: k8s
  template:
  - ytt:
      inline:
        paths:
          overlay.yaml: |
            #@ load("@ytt:overlay", "overlay")
            #@overlay/match by=overlay.subset({"kind": "Namespace", "metadata": {"name": "conclave"}}), expects="0+"
            #@overlay/remove
            ---
  deploy:
  - kapp: {}
