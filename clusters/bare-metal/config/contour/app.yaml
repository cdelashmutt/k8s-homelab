---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: gateway-api
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: contour
    kapp.k14s.io/change-rule.0: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.1: "delete before deleting cert-manager"
    kapp.k14s.io/change-rule.2: "upsert after upserting metal-lb"
    kapp.k14s.io/change-rule.3: "delete before deleting metal-lb"
    kapp.k14s.io/change-rule.4: "upsert after upserting external-dns"
    kapp.k14s.io/change-rule.5: "delete before deleting external-dns"

spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
    - git:
        url: https://github.com/projectcontour/contour
        ref: origin/v1.33.3
        lfsSkipSmudge: true
        subPath: examples
  template:
    - ytt:
        strict: true
        inline:
          paths: 
            overlays/envoy-service-overlay.yaml: |
              #@ load("@ytt:overlay", "overlay")
              #@overlay/match by=overlay.subset({"kind": "Service", "metadata":{"name":"envoy"}})
              ---
              metadata:
                annotations:
                  #@overlay/match missing_ok=True
                  external-dns.alpha.kubernetes.io/hostname: "*.home.grogscave.net"
              spec:
                #@overlay/match missing_ok=True
                loadBalancerIP: 192.168.0.50
            overlays/remove-certgen.yaml: |
              #@ load("@ytt:overlay", "overlay")
              #@overlay/match by=overlay.subset({"kind": "ServiceAccount", "metadata": {"name": "contour-certgen"}})
              #@overlay/remove
              ---
              #@overlay/match by=overlay.subset({"kind": "Role", "metadata": {"name": "contour-certgen"}})
              #@overlay/remove
              ---
              #@overlay/match by=overlay.subset({"kind": "RoleBinding", "metadata": {"name": "contour"}})
              #@overlay/remove
              ---
              #@overlay/match by=overlay.subset({"kind": "Job", "metadata": {"name": "contour-certgen-v1-33-3"}})
              #@overlay/remove
              ---
            overlays/certs.yaml: |
              ---
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: wildcard-home-grogscave-net
                namespace: projectcontour
              spec:
                secretName: wildcard-tls
                privateKey:
                  rotationPolicy: Always
                commonName: home.grogscave.net
                dnsNames:
                  - "*.home.grogscave.net"
                  - "home.grogscave.net"
                issuerRef:
                  name: letsencrypt-cluster-issuer
                  kind: ClusterIssuer
              ---
              apiVersion: secretgen.carvel.dev/v1alpha1
              kind: SecretExport
              metadata:
                name: wildcard-tls
                namespace: projectcontour
              spec:
                toNamespaces:
                - harbor
                - rook-ceph
                - librechat
              ---
              apiVersion: cert-manager.io/v1
              kind: Issuer
              metadata:
                name: contour-selfsigned-issuer
                namespace: projectcontour
              spec:
                selfSigned: {}
              ---
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: contour-ca
                namespace: projectcontour
              spec:
                isCA: true
                commonName: contour-ca
                secretName: contour-ca
                privateKey:
                  algorithm: ECDSA
                  size: 256
                issuerRef:
                  name: contour-selfsigned-issuer
                  kind: Issuer
              ---
              apiVersion: cert-manager.io/v1
              kind: Issuer
              metadata:
                name: contour-ca-issuer
                namespace: projectcontour
              spec:
                ca:
                  secretName: contour-ca
              ---
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: contourcert
                namespace: projectcontour
              spec:
                secretName: contourcert
                usages:
                  - server auth
                  - client auth
                dnsNames:
                  - contour
                  - contour.projectcontour
                  - contour.projectcontour.svc
                  - contour.projectcontour.svc.cluster.local
                issuerRef:
                  name: contour-ca-issuer
                  kind: Issuer
              ---
              apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: envoycert
                namespace: projectcontour
              spec:
                secretName: envoycert
                usages:
                  - server auth
                  - client auth
                dnsNames:
                  - envoy
                  - envoy.projectcontour
                  - envoy.projectcontour.svc
                  - envoy.projectcontour.svc.cluster.local
                issuerRef:
                  name: contour-ca-issuer
                  kind: Issuer
            # overlays/contour-config.yaml: |
            #   #@ load("@ytt:overlay", "overlay")
            #   #@overlay/match by=overlay.subset({"kind": "ConfigMap", "metadata":{"name":"contour"}})
            #   ---
            #   data:
            #     contour.yaml: |
            #       gateway:
            #         gatewayRef:
            #           name: contour
            #           namespace: projectcontour
        paths:
        # - gateway/00-crds.yaml
        # - gateway/01-gatewayclass.yaml
        # - gateway/02-gateway.yaml
        - contour/
  deploy:
    - kapp: {}