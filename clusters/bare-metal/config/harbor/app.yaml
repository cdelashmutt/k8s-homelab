---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: harbor
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-rule.0: "upsert after upserting cert-manager"
    kapp.k14s.io/change-rule.1: "delete before deleting cert-manager"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - helmChart:
      name: harbor
      version: 1.18.3
      repository:
        url: https://helm.goharbor.io
  template:
  - helmTemplate:
      namespace: harbor
      valuesFrom:
      - secretRef:
          name: harbor-values
  - ytt:
      inline:
        paths:
          changeconfig.yaml: |
            apiVersion: kapp.k14s.io/v1alpha1
            kind: Config
            minimumRequiredVersion: 0.23.0
            changeGroupBindings:
            - name: harbor-core-changegroup
              resourceMatchers:
              - kindNamespaceNameMatcher: {kind: Deployment, namespace: harbor, name:harbor-core}
          namespace.yaml: |
            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: harbor
          secretimport.yaml: |
            ---
            apiVersion: secretgen.carvel.dev/v1alpha1
            kind: SecretImport
            metadata:
              name: wildcard-tls
              namespace: harbor
            spec:
              fromNamespace: cert-manager
            ---
            apiVersion: secretgen.carvel.dev/v1alpha1
            kind: SecretImport
            metadata:
              name: harbor-admin-credentials
              namespace: harbor
            spec:
              fromNamespace: bootstrap
          harbor-setup.yaml: |
            ---
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: harbor-setup
              namespace: harbor
              annotations:
                kapp.k14s.io/update-strategy: skip
                kapp.k14s.io/change-rule.0: "upsert after upserting harbor-core-changegroup"
            spec:
              backoffLimit: 20
              template:
                spec:
                  restartPolicy: OnFailure
                  containers:
                  - name: setup
                    image: curlimages/curl:latest
                    env:
                    - name: HARBOR_ADMIN_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: harbor-admin-credentials
                          key: password
                    - name: HARBOR_HOSTNAME
                      valueFrom:
                        secretKeyRef:
                          name: harbor-admin-credentials
                          key: hostname
                    command:
                    - /bin/sh
                    - -c
                    - |
                      set -e
                      HARBOR_URL="http://harbor-core.harbor.svc.cluster.local:8080"

                      echo "Waiting for Harbor API..."
                      until curl -sf "${HARBOR_URL}/api/v2.0/systeminfo" | grep -q 'harbor_version'; do
                        sleep 10
                      done
                      echo "Harbor is ready."

                      # Create docker-hub registry endpoint if not exists
                      if ! curl -sf -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          "${HARBOR_URL}/api/v2.0/registries?name=docker-hub" | grep -q '"name":"docker-hub"'; then
                        echo "Creating docker-hub registry..."
                        curl -sf -X POST -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          -H "Content-Type: application/json" \
                          "${HARBOR_URL}/api/v2.0/registries" \
                          -d '{"name":"docker-hub","type":"docker-hub","url":"https://hub.docker.com","insecure":false}'
                        echo ""
                      fi

                      REG_ID=$(curl -sf -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                        "${HARBOR_URL}/api/v2.0/registries?name=docker-hub" | \
                        grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
                      echo "docker-hub registry id: ${REG_ID}"

                      # Create docker-hub proxy project if not exists
                      if ! curl -sf -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          "${HARBOR_URL}/api/v2.0/projects?name=docker-hub" | grep -q '"name":"docker-hub"'; then
                        echo "Creating docker-hub proxy project..."
                        curl -sf -X POST -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          -H "Content-Type: application/json" \
                          "${HARBOR_URL}/api/v2.0/projects" \
                          -d "{\"project_name\":\"docker-hub\",\"public\":true,\"registry_id\":${REG_ID}}"
                        echo ""
                      fi

                      # Create homelab project if not exists
                      if ! curl -sf -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          "${HARBOR_URL}/api/v2.0/projects?name=homelab" | grep -q '"name":"homelab"'; then
                        echo "Creating homelab project..."
                        curl -sf -X POST -u "admin:${HARBOR_ADMIN_PASSWORD}" \
                          -H "Content-Type: application/json" \
                          "${HARBOR_URL}/api/v2.0/projects" \
                          -d '{"project_name":"homelab","public":false}'
                        echo ""
                      fi

                      echo "Done."
          token-secret.yaml: |
            ---
            apiVersion: secretgen.k14s.io/v1alpha1
            kind: Certificate
            metadata:
              name: token-ca-cert
              namespace: harbor
              annotations:
                kapp.k14s.io/change-rule.0: "upsert before upserting harbor-core-changegroup"
            spec:
              isCA: true
            ---
            apiVersion: secretgen.k14s.io/v1alpha1
            kind: Certificate
            metadata:
              name: token-cert
              namespace: harbor
              annotations:
                kapp.k14s.io/change-rule.0: "upsert before upserting harbor-core-changegroup"
            spec:
              caRef:
                name: token-ca-cert
              secretTemplate:
                stringData:
                  tls.crt: $(certificate)
                  tls.key: $(privateKey)
  deploy:
  - kapp: {}