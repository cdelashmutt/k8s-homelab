---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: system-upgrade-controller
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: system-upgrade-controller
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - http:
      url: https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.1/system-upgrade-controller.yaml
  - http:
      url: https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.0/crd.yaml
  template:
  - ytt:
      inline:
        paths:
          plans.yaml: |
            ---
            # Pinned to v1.32 minor channel — patch upgrades happen automatically.
            # When Renovate opens a PR to bump this to v1.33, review release notes,
            # merge, and system-upgrade-controller rolls the upgrade node-by-node.
            apiVersion: upgrade.cattle.io/v1
            kind: Plan
            metadata:
              name: k3s-server
              namespace: system-upgrade
            spec:
              concurrency: 1
              channel: https://update.k3s.io/v1-release/channels/v1.34
              upgrade:
                image: rancher/k3s-upgrade
              drain:
                force: true
                ignoreDaemonSets: true
                deleteEmptydirData: true
              serviceAccountName: system-upgrade
              nodeSelector:
                matchExpressions:
                - key: k3s.io/hostname
                  operator: Exists
  deploy:
  - kapp: {}
