---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tailscale-operator-values
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: tailscale-operator-values
data:
  values.yaml: |
    operatorConfig:
      hostname: tailscale-operator
      # Tags applied to all proxy devices (Ingress proxies, Connector, etc.)
      # tag:k8s must be owned by tag:k8s-operator in your Tailscale ACL policy.
      # tag:k8s must also have the "funnel" nodeAttr in your ACL policy to use Funnel.
      defaultTags:
        - "tag:k8s"
---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: tailscale
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: tailscale
    kapp.k14s.io/change-rule.0: "upsert after upserting tailscale-operator-values"
    kapp.k14s.io/change-rule.1: "upsert after upserting tailscale-operator-secrets"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - helmChart:
      name: tailscale-operator
      version: "1.98.4"
      repository:
        url: https://pkgs.tailscale.com/helmcharts
  template:
  - helmTemplate:
      namespace: tailscale
      valuesFrom:
      - secretRef:
          name: tailscale-operator-secrets
      - configMapRef:
          name: tailscale-operator-values
  - ytt:
      inline:
        paths:
          connector.yaml: |
            ---
            apiVersion: tailscale.com/v1alpha1
            kind: Connector
            metadata:
              name: k8s-subnet-router
            spec:
              hostname: k8s-subnet-router
              subnetRouter:
                advertiseRoutes:
                  - "192.168.0.0/24"
  deploy:
  - kapp: {}
