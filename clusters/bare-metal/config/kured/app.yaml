---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kured-values
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: kured-values
data:
  values.yaml: |
    configuration:
      # Only reboot during this window to avoid unexpected disruptions
      rebootDays: [sa]
      startTime: "02:00"
      endTime: "23:59"
      # Reboot one node at a time (Kubernetes drain handled by kured)
      concurrency: 1
      # Required to drain past Longhorn instance-manager PodDisruptionBudgets
      drainDisableEviction: true
---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: kured
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: kured
    kapp.k14s.io/change-rule: "upsert after upserting kured-values"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - helmChart:
      name: kured
      version: "5.11.0"
      repository:
        url: https://kubereboot.github.io/charts
  template:
  - helmTemplate:
      namespace: kube-system
      valuesFrom:
      - configMapRef:
          name: kured-values
  deploy:
  - kapp: {}
