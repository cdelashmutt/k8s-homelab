---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: external-dns
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: external-dns
    kapp.k14s.io/change-rule.0: "upsert after upserting external-dns-secret"
    kapp.k14s.io/change-rule.1: "upsert after upserting kube-vip"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - inline:
      paths:
        rbac.yaml: |
          ---
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: external-dns
            namespace: external-dns
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: external-dns
          rules:
          - apiGroups: [""]
            resources: ["services","endpoints","pods"]
            verbs: ["get","watch","list"]
          - apiGroups: ["extensions","networking.k8s.io"]
            resources: ["ingresses"]
            verbs: ["get","watch","list"]
          - apiGroups: [""]
            resources: ["nodes"]
            verbs: ["list"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: external-dns-viewer
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: external-dns
          subjects:
          - kind: ServiceAccount
            name: external-dns
            namespace: external-dns
        deployment.yaml: |
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: external-dns
            namespace: external-dns
            annotations:
              kapp.k14s.io/change-group: external-dns
          spec:
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: external-dns
            template:
              metadata:
                labels:
                  app: external-dns
              spec:
                serviceAccountName: external-dns
                nodeSelector:
                  node-role.kubernetes.io/control-plane: "true"
                tolerations:
                - effect: NoExecute
                  operator: Exists
                - effect: NoSchedule
                  operator: Exists
                containers:
                - name: external-dns
                  image: registry.k8s.io/external-dns/external-dns:v0.20.0
                  args:
                  - --source=service
                  - --domain-filter=home.grogscave.net
                  - --service-type-filter=LoadBalancer
                  - --provider=aws
                  - --policy=upsert-only
                  - --aws-zone-type=public
                  - --registry=txt
                  - --txt-owner-id=bare-metal
                  - --log-level=info
                  env:
                  - name: AWS_DEFAULT_REGION
                    value: us-east-1
                  - name: AWS_SHARED_CREDENTIALS_FILE
                    value: /.aws/credentials
                  volumeMounts:
                  - name: aws-credentials
                    mountPath: /.aws
                    readOnly: true
                volumes:
                - name: aws-credentials
                  secret:
                    secretName: aws-credentials
  template:
  - ytt: {}
  deploy:
  - kapp: {}
