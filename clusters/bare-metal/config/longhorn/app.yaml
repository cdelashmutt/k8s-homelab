---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-values
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: longhorn-values
data:
  values.yaml: |
    defaultSettings:
      defaultReplicaCount: 2
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Delete
    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.home.grogscave.net
      tls: true
      tlsSecret: wildcard-tls
    metrics:
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: monitoring
---
apiVersion: kappctrl.k14s.io/v1alpha1
kind: App
metadata:
  name: longhorn
  namespace: bootstrap
  annotations:
    kapp.k14s.io/change-group: longhorn
    kapp.k14s.io/change-rule.0: "upsert after upserting longhorn-values"
    kapp.k14s.io/change-rule.1: "upsert after upserting cert-manager"
spec:
  serviceAccountName: bootstrap
  syncPeriod: 10m
  fetch:
  - helmChart:
      name: longhorn
      version: "1.11.2"
      repository:
        url: https://charts.longhorn.io
  template:
  - helmTemplate:
      namespace: longhorn-system
      valuesFrom:
      - configMapRef:
          name: longhorn-values
  - ytt:
      inline:
        paths:
          namespace.yaml: |
            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: longhorn-system
          recurring-jobs.yaml: |
            ---
            apiVersion: longhorn.io/v1beta2
            kind: RecurringJob
            metadata:
              name: daily-snapshot
              namespace: longhorn-system
            spec:
              cron: "0 2 * * *"
              task: snapshot
              groups:
              - default
              retain: 7
              concurrency: 2
              labels: {}
            ---
            apiVersion: longhorn.io/v1beta2
            kind: RecurringJob
            metadata:
              name: weekly-backup
              namespace: longhorn-system
            spec:
              cron: "0 3 * * 0"
              task: backup
              groups:
              - default
              retain: 4
              concurrency: 2
              labels: {}
          backup-target.yaml: |
            ---
            apiVersion: longhorn.io/v1beta2
            kind: BackupTarget
            metadata:
              name: default
              namespace: longhorn-system
            spec:
              backupTargetURL: "nfs://192.168.0.81:/mnt/main/longhorn-backups"
              credentialSecret: ""
              pollInterval: 5m0s
          job-annotations.yaml: |
            #@ load("@ytt:overlay", "overlay")
            #@overlay/match by=overlay.subset({"kind": "Job"}), expects="0+"
            ---
            metadata:
              annotations:
                #@overlay/match missing_ok=True
                kapp.k14s.io/update-strategy: fallback-on-replace
            ---
            #@overlay/match by=overlay.subset({"kind": "Job", "metadata": {"name": "longhorn-uninstall"}}), expects="0+"
            #@overlay/remove
  deploy:
  - kapp: {}
